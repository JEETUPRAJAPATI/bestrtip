                <div class="container-xxl flex-grow-1 container-p-y">

                <!-- Basic Layout -->
                  <div class="row">
                    <div class="col-xl">
                      <div class="card mb-4">
                        <div class="card-body">
                          <form>
                            <div class="row mb-3">
                                <div class="col-md">
                                  <label class="form-label" for="basic-default-phone">Name</label>
                                  <input type="text" class="form-control phone-mask" placeholder="" />
                                </div>
                                <div class="col-md">
                                  <label class="form-label" for="basic-default-phone">Number of Room</label>
                                  <input type="text" class="form-control phone-mask" placeholder="" />
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md">
                                  <label class="form-label" for="basic-default-phone">Category</label>
                                  <select class="form-select" disabled>
                                    <option selected>Hotel</option>
                                    <option>Restaurant</option>
                                    <option>Guide</option>
                                    <option>Transport</option>
                                    <option>Motor Bike Supplier</option>
                                    <option>Other Supplier</option>
                                  </select>
                                </div>
                                <div class="col-md">
                                  <label class="form-label" for="basic-default-phone">Location</label>
                                  <input type="text" class="form-control phone-mask" placeholder="" />
                                </div>
                              </div>
                              <div class="row mb-3">
                                <h3 class="mt-3 mb-3">Add Price</h3>
                                <div class="row mb-3">
                                    <div class="table-responsive">
                                      <table class="table table-bordered">
                                        <thead class="table-dark">
                                          <tr>
                                            <th class="text-white px-2" style="max-width: 84px">Rooming</th>
                                            <th class="text-white px-2" style="max-width: 84px">MPAI</th>
                                            <th class="text-white px-2">API</th>
                                            <th class="text-white px-2">CP</th>
                                            <th class="text-white px-2">EP</th>
                                          </tr>
                                        </thead>
                                        <tbody class="table-border-bottom-0">
                                          <tr>
                                            <td>Double</td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                          </tr>
                                          <tr>
                                            <td>Single</td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                          </tr>
                                          <tr>
                                            <td>Extra bed</td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                          </tr>
                                          <tr>
                                            <td>Child no bed</td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                            <td>
                                                <input type="text" class="form-control phone-mask" placeholder="" />
                                            </td>
                                          </tr>
                                        </tbody>
                                      </table>
                                    </div>
                                  </div>
                              </div>

                            <button type="submit" class="btn btn-primary">Save</button>
                          </form>
                        </div>
                      </div>
                    </div>
                  </div>
              </div>
              <!-- / Content -->
            </div>
